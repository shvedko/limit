http {
    upstream go_limiters {
        # Метод балансировки: хэш от значения переменной
        # consistent — включает Consistent Hashing (кетамин),
        # чтобы при падении одного сервера перераспределилось минимум ключей.
        hash $http_x_user_id consistent;

        server 192.168.1.10:8080;
        server 192.168.1.11:8080;
        server 192.168.1.12:8080;
        server 192.168.1.13:8080;

        keepalive 64; # Держим открытые соединения для скорости
    }

    server {
        listen 80;

        location /api/ {
            # Проверяем наличие заголовка, чтобы хэш не был пустым
            if ($http_x_user_id = "") {
                return 400 "Missing X-User-ID header";
            }

            proxy_pass http://go_limiters;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # Передаем реальный IP и ID дальше
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-User-ID $http_x_user_id;
        }
    }
}

// Инициализируем лимитер со строковыми ключами
l := slablimit.New[string](100, 60)

func handler(w http.ResponseWriter, r *http.Request) {
    userID := r.Header.Get("X-User-ID")
    if !l.Allow(userID) {
        http.Error(w, "Too Many Requests", http.StatusTooManyRequests)
        return
    }
    // ... логика приложения
}

import (
	"://github.com"
	"://github.com/promauto"
	"://github.com/promhttp"
)

// Описываем метрики
var (
	usersActive = promauto.NewGauge(prometheus.GaugeOpts{
		Name: "slablimit_active_users",
		Help: "Current number of users in the index map",
	})

	limitExceeded = promauto.NewCounter(prometheus.CounterOpts{
		Name: "slablimit_exceeded_total",
		Help: "Total number of blocked requests",
	})
)

// В твоем HTTP-обработчике:
func handler(w http.ResponseWriter, r *http.Request) {
	userID := r.Header.Get("X-User-ID")

	// Обновляем размер индекса (можно делать это раз в секунду в Janitor, чтобы не дергать Size() на каждый запрос)
	usersActive.Set(float64(l.Size()))

	if !l.Allow(userID) {
		limitExceeded.Inc()
		http.Error(w, "Too Many Requests", 429)
		return
	}
	// ...
}

// Запускаем сервер метрик на отдельном порту (безопасность!)
func main() {
	go func() {
		http.Handle("/metrics", promhttp.Handler())
		http.ListenAndServe(":9090", nil)
	}()
	// ... основной код
}
